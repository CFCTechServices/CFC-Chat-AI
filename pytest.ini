[pytest]
pythonpath = .
testpaths = tests
markers =
    integration: marks tests as integration tests (require a live server and .env credentials)
addopts = 
    --ignore-glob=tests/test_admin_*.py
    --ignore=tests/test_profile.py
    --ignore=tests/test_update_session.py
    --ignore=tests/test_inactive_user_access.py
